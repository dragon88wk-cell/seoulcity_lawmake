name: Seoul Notice Scraper

on:
  schedule:
    # 0 * * * * 은 '매시간 정각'을 의미합니다. (하루 24번 실행)
    # 깃허브는 기본적으로 UTC(세계표준시)를 따르지만, 매시간 도는 것이라면 한국 시간과 무관하게 잘 작동합니다.
    - cron: '0 * * * *'
  workflow_dispatch: # 이 줄을 넣으면 깃허브 페이지에서 수동으로 실행 버튼(Run workflow)을 누를 수 있습니다.

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 필요한 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 4. 스크래핑 코드 실행
      env:
        # 아까 Secrets에 등록한 값을 불러와 파이썬 코드에 넘겨줍니다.
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: 5. 변경된 기록(last_posts.json) 저장소에 다시 덮어쓰기
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add last_posts.json
        # 변경된 사항(새 글이 떠서 json이 업데이트된 경우)이 있을 때만 커밋과 푸시를 진행합니다.
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update last posts record" && git push)
